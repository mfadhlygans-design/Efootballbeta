<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Game Download Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1b2330; padding: 2rem; border-radius: 16px; width: 320px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #333; border-radius: 8px; background: #0d1117; color: white; }
    button { width: 100%; padding: 12px; background: #5b6bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .toggle-link { color: #7b8dff; cursor: pointer; }
    .hidden { display: none; }
    .message { margin: 8px 0; font-size: 14px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Login Form -->
    <div id="loginForm">
      <h2>Welcome Back</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="loginBtn">Sign In</button>
      <p>Don't have an account? <span class="toggle-link" id="showRegister">Register</span></p>
      <div class="message" id="loginMsg"></div>
    </div>
    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <h2>Create Account</h2>
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password (min 6)">
      <button id="registerBtn">Register</button>
      <p>Already have an account? <span class="toggle-link" id="showLogin">Sign In</span></p>
      <div class="message" id="regMsg"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSU6JbJEqN4kSNof_FVP2HAPlbCteYLDs",
      authDomain: "efootballbeta-dc7c8.firebaseapp.com",
      projectId: "efootballbeta-dc7c8",
      storageBucket: "efootballbeta-dc7c8.firebasestorage.app",
      messagingSenderId: "453823717421",
      appId: "1:453823717421:web:bbcc5ecf25b4833196d8a4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('showRegister').onclick = () => {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    };
    document.getElementById('showLogin').onclick = () => {
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    };

    document.getElementById('registerBtn').onclick = async () => {
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value.trim();
      const msg = document.getElementById('regMsg');
      if (!email || !pass) { msg.className = 'message error'; msg.textContent = 'Isi semua field.'; return; }
      if (pass.length < 6) { msg.className = 'message error'; msg.textContent = 'Password minimal 6 karakter.'; return; }
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, "users", email), { email: email, createdAt: serverTimestamp() });
        msg.className = 'message success';
        msg.textContent = 'Registrasi berhasil!';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        setTimeout(() => {
          document.getElementById('registerForm').classList.add('hidden');
          document.getElementById('loginForm').classList.remove('hidden');
          msg.className = 'message';
        }, 1500);
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = e.code === 'auth/email-already-in-use' ? 'Email sudah terdaftar.' : e.message;
      }
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value.trim();
      const msg = document.getElementById('loginMsg');
      if (!email || !pass) { msg.className = 'message error'; msg.textContent = 'Isi semua field.'; return; }
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        await addDoc(collection(db, "loginLogs"), { email: email, timestamp: serverTimestamp() });
        msg.className = 'message success';
        msg.textContent = 'Login berhasil!';
        window.location.href = 'download.html';
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') ? 'Email atau password salah.' : e.message;
      }
    };
  </script>
</body>
</html>
